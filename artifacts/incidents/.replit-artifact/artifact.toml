kind = "web"
previewPath = "/"
title = "Quality Incident Reporting"
version = "1.0.0"
id = "artifacts/incidents"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20884

[services.development]
run = "pnpm --filter @workspace/incidents run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/incidents", "run", "build" ]
publicDir = "artifacts/incidents/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20884"
BASE_PATH = "/"
