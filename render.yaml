databases:
  - name: quality-reporter-db
    databaseName: quality_reporter
    user: quality_reporter_user
    plan: free

services:
  # ─── API SERVER (Backend) ────────────────────────────────────────────────
  - type: web
    name: quality-reporter-api
    runtime: node
    plan: starter
    repo: https://github.com/Olseenoy/Quality-Reporter
    branch: main
    rootDir: .
    buildCommand: >
      npm install -g pnpm@latest &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/incidents/api-server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: quality-reporter-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://quality-reporter-ui.onrender.com   # update after frontend is created

  # ─── FRONTEND (Static Site) ──────────────────────────────────────────────
  - type: web
    name: quality-reporter-ui
    runtime: static
    plan: starter
    repo: https://github.com/Olseenoy/Quality-Reporter
    branch: main
    rootDir: artifacts/incidents/frontend
    buildCommand: >
      npm install -g pnpm@latest &&
      cd ../../.. &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/frontend run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://quality-reporter-api.onrender.com
